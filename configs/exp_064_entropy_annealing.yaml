name: exp_064_entropy_annealing
backend: racing
hypothesis: "exp_061/062 confirm deployment-time fixes are insufficient (2 gates in 70 runs).
  The policy mean hasn't learned navigation. Three changes from exp_060:
  1. Remove max_logstd clamp — let std be learnable without artificial constraint.
     With clamp=-1.0, std is forced to ~0.37 from the start, which may prevent
     exploration needed for the mean to find the navigation mode.
  2. Higher ent_coef=0.03 — encourage exploration early in training.
  3. Longer budget (7200s) — Swift trains 100M steps; we get ~1.5M in 3600s.
     Doubling budget should reach ~3M steps. The mean needs more time to converge.
  Paper basis: Entropy Annealing (2405.20250) — start high, let it decay naturally
  via learnable logstd. Dynamic Entropy Tuning (2512.18336) — stochastic policies
  generalize where deterministic crash."
budget_seconds: 7200
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 40000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.03
  ent_coef_final: 0.001
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === NO LOGSTD CLAMP (key change from exp_060) ===
  # max_logstd: removed — let std be fully learnable
  # === MINIMUM STABILITY ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === BILATERAL PROGRESS (strong, from exp_056) ===
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === BODY-FRAME GATE OBSERVATIONS ===
  body_frame_obs: true
  # === SOFT-COLLISION CURRICULUM ===
  soft_collision: true
  soft_collision_penalty: 5.0
  soft_collision_steps: 10000000
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
