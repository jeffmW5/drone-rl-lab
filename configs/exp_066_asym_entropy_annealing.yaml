name: exp_066_asym_entropy_annealing
backend: racing
hypothesis: "Highest-upside combination test: pair exp_064's longer-budget,
  unclamped-variance, higher-entropy training with exp_059's asymmetric critic,
  plus exp_065's periodic deterministic evaluation. If the main missing pieces
  are better value targets and more time for the mean policy to converge, this
  combination should outperform either change alone on deterministic evaluation
  and benchmark selection. This is an upside-seeking experiment, not a clean
  attribution study."
budget_seconds: 7200
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 40000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.03
  ent_coef_final: 0.001
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === NO LOGSTD CLAMP ===
  # max_logstd: removed
  # === MINIMUM STABILITY ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === BILATERAL PROGRESS ===
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === BODY-FRAME GATE OBSERVATIONS ===
  body_frame_obs: true
  # === SOFT-COLLISION CURRICULUM ===
  soft_collision: true
  soft_collision_penalty: 5.0
  soft_collision_steps: 10000000
  # === ASYMMETRIC CRITIC ===
  asymmetric_critic: true
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
  # === PERIODIC DETERMINISTIC EVAL ===
  periodic_deterministic_eval:
    enabled: true
    every_iterations: 50
    n_episodes: 8
    num_envs: 8
    save_best_checkpoint: true
