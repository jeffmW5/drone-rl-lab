name: exp_055_race_start_takeoff
backend: racing
hypothesis: "exp_054 (race start, no random gates) is stuck at reward 8.89 because z_low=-0.05
  gives full altitude reward at ground level (z=0.01), removing incentive to take off. Setting
  z_low=0.5 penalizes ground sitting: at z=0.01, alt_error=0.49, alt_reward=0.115 (vs 0.5 at
  z≥0.5). This creates a +3.08/rollout incentive to climb. Also increase alt_coef to 1.0 (from
  0.5) to make the altitude signal stronger. Combined with progress_coef=50, the policy must
  take off AND navigate to maximize reward."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === TIGHT LOGSTD CLAMP ===
  max_logstd: -1.0
  # === SURVIVE — same as best ===
  survive_coef: 0.05
  # === ALTITUDE — penalize ground level ===
  alt_coef: 1.0
  z_low: 0.5
  z_high: 2.0
  # === PROGRESS + GATE ===
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === RACE START (NO RANDOM GATE SPAWNS) ===
  max_episode_steps: 1500
  random_gate_start: false
  random_gate_ratio: 0.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
