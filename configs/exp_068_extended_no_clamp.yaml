name: exp_068_extended_no_clamp
backend: racing
hypothesis: "exp_067 reached 32.01 reward and was still climbing steeply at budget
  end (3600s, 1.5M steps). Doubling the budget to 7200s should reach ~3M steps.
  If the unclamped policy continues improving and benchmark gates emerge, this
  supports HYP-002 (undertraining). If reward plateaus or benchmark stays at 0
  gates despite higher reward, undertraining is not the primary issue.
  Single change from exp_067: budget_seconds 3600 → 7200."
budget_seconds: 7200
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 40000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === NO LOGSTD CLAMP (validated in exp_067) ===
  # max_logstd: removed
  # === MINIMUM STABILITY ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === BILATERAL PROGRESS ===
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === BODY-FRAME GATE OBSERVATIONS ===
  body_frame_obs: true
  # === SOFT-COLLISION CURRICULUM ===
  soft_collision: true
  soft_collision_penalty: 5.0
  soft_collision_steps: 10000000
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
