name: exp_051_longer_rollout
backend: racing
hypothesis: "exp_046 (survive=0.05, tight logstd, num_steps=8) flies 1.3s toward gate but crashes.
  With gamma=0.97 and 8-step rollouts, the value function must accurately predict ~65 steps of
  future navigation reward + gate_bonus=10 from only 8 steps of observation. This is hard.
  Increasing num_steps to 64 means each rollout covers 64×0.02s=1.28s — nearly the full flight
  to the gate. The GAE advantage estimation can directly observe the navigation benefit vs hover.
  Keep survive=0.05 (which produces navigation, not hover) and all other params from exp_046.
  Also increase gate_bonus to 50 since the longer rollouts capture gate-passage signal better."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 64
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === TIGHT LOGSTD CLAMP ===
  max_logstd: -1.0
  # === SAME AS EXP_046 ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === LARGER GATE BONUS ===
  progress_coef: 50.0
  gate_bonus: 50.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
