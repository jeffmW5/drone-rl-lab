name: ai_gp_040_near_gate_teacher_bc_30m
backend: ai_gp_swift_bc
hypothesis: >
  Hybrid evaluation of 039 showed that switching to the geometric teacher only
  within 10 m of the active gate plane produced 100% randomized success over
  seeds 1001-1003, while the pure 039 actor averaged 69.60%. This run starts
  from 039 and behavior-clones that hybrid target: geometric teacher actions in
  the near-gate envelope, frozen 039 actor actions elsewhere. The goal is to
  internalize the near-gate correction without losing the solved full-course
  setup behavior.
budget_seconds: 1500

swift_bc:
  total_interactions: 30146560
  learning_rate: 0.00005
  eval_interval_updates: 100
  action_loss_weights: [0.9, 1.2, 1.2, 0.6]
  actor_anchor_coef: 1.5
  actor_anchor_decay_steps: 0
  teacher_target_mode: near_gate_teacher
  takeover_distance_m: 10.0
  lateral_threshold_m: 0.40
  vertical_threshold_m: 0.40
  gate_indices: all
  non_takeover_loss_weight: 0.05
  student_rollout_start_interactions: 10000000
  student_rollout_end_interactions: 25000000
  max_student_rollout_ratio: 0.25

ai_gp:
  device: cuda
  allow_cpu: false
  seed: 229
  num_envs: 4096
  hidden_sizes: [256, 256]
  eval_episodes: 512
  eval_num_envs: 512
  eval_randomization: true
  initial_actor_checkpoint: results/ai_gp_039_all_gate_soft_floor_ppo_30m/best_policy.pt
  allow_teacher_initialization: true

  env:
    actor_observation_mode: structured_teacher_v2
    track_name: ai_gp_six_gate
    track_ground_clearance_m: 1.5
    start_position_ned_m: [0.0, 0.0, 0.0]
    position_observation_scale_m: [180.0, 20.0, 35.0]

    dt: 0.02
    physics_substeps: 2
    max_episode_steps: 1500
    randomization: true
    align_spawn_heading_to_gate: true
    start_position_noise_m: [0.25, 0.25, 0.08]
    start_velocity_noise_mps: 0.20
    spawn_yaw_noise_rad: 0.22
    spawn_tilt_noise_rad: 0.05
    gate_jitter_m: [0.16, 0.16, 0.14]

    near_gate_spawn_ratio_start: 0.80
    near_gate_spawn_ratio_end: 0.60
    near_gate_indices: [0, 1, 2, 3, 4, 5]
    near_gate_index_weights: [3.0, 8.0, 4.0, 6.0, 5.0, 6.0]
    near_gate_distance_m: [0.25, 9.0]
    near_gate_lateral_offset_m: [-2.45, 2.45]
    near_gate_vertical_offset_m: [-2.35, 2.85]
    near_gate_forward_speed_mps: [2.5, 8.2]
    near_gate_lateral_speed_mps: [-4.6, 4.6]
    near_gate_vertical_speed_mps: [-1.2, 1.2]
    near_gate_roll_rad: [-0.22, 0.22]
    near_gate_pitch_rad: [-0.65, 0.25]
    near_gate_yaw_offset_rad: [-0.50, 0.50]
    near_gate_previous_action_range:
      - [-0.55, 0.55]
      - [-1.00, 1.00]
      - [-1.00, 1.00]
      - [-0.60, 0.60]
    soft_collision_fraction: 0.0

    dynamics_model: measured_ai_gp_v1
    max_roll_rate_radps: 0.30
    max_pitch_rate_radps: 0.20
    max_yaw_rate_radps: 0.15
    thrust_command_center: 0.295
    thrust_command_span_up: 0.105
    thrust_command_span_down: 0.095
    thrust_acceleration_bias_mps2: -5.6171800889
    thrust_acceleration_gain_mps2: 57.2914093237
    base_pitch_offset_rad: 0.3106907308
    linear_drag_xyz: [0.1417047358, 0.1417047358, 0.3905510548]
    quadratic_drag_xyz: [0.0222959629, 0.0222959629, 0.0117516223]
    rate_response_gain: [2.6503460081, 2.5121130023, 2.5812295052]
    command_latency_s: 0.046
    command_latency_s_range: [0.035, 0.065]
    rate_time_constant_s: 0.005
    rate_time_constant_s_range: [0.005, 0.014]
    action_response: 1.0
    action_response_range: [0.90, 1.0]
    mass_scale_range: [0.96, 1.04]
    thrust_scale_range: [0.93, 1.07]
    drag_scale_range: [0.88, 1.12]
    rate_response_gain_scale_range: [0.92, 1.08]
    wind_accel_mps2: 0.16

    max_altitude_m: 35.0
    max_lateral_m: 22.0
    min_forward_m: -8.0
    max_forward_m: 182.0

    progress_reward: 8.0
    gate_reward: 150.0
    finish_reward: 300.0
    camera_alignment_reward: 0.12
    camera_alignment_exponent: 4.0
    forward_speed_reward: 0.0
    visibility_reward: 0.0
    alive_reward: 0.0
    angular_rate_penalty: 0.001
    action_delta_penalty: 0.020
    thrust_saturation_penalty: 0.12
    vertical_speed_penalty: 0.30
    altitude_penalty: 2.2
    low_altitude_penalty: 18.0
    soft_floor_altitude_m: 0.55
    gate_altitude_error_penalty: 1.45
    gate_lateral_error_penalty: 1.45
    collision_penalty: 60.0
    out_of_bounds_penalty: 35.0
    missed_gate_penalty: 620.0
    terminate_on_missed_gate: true
