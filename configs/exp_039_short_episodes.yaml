name: exp_039_short_episodes
backend: racing
hypothesis: "Curriculum with short episodes (300 steps = 6s). All reward tuning (exp_026-037) and
  entropy (exp_038) exhausted — deterministic mean always hover-or-crash. Short episodes bound hover
  reward: max survive = 300*0.5 = 150. Navigation to gate 0 (~250 steps) yields 255 total. Navigate
  is 1.7x better than hover in 6s episodes vs barely better in 30s episodes. The truncation fix
  (exp_033) bootstraps correctly through these timeouts. Fine-tune from exp_034 (stable hover +
  PBRS + truncation fix). This is STRUCTURAL change — not reward tuning or regularization."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_034_pbrs_speed/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0001
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  gate_bonus: 20.0
  proximity_coef: 1.0
  progress_coef: 50.0
  speed_coef: 0.7
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 300
  alt_coef: 1.5
  survive_coef: 0.5
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  random_gate_start: false
