name: exp_010_racing_baseline
backend: racing
hypothesis: "Baseline CleanRL PPO on Level 0 drone racing — perfect knowledge, no randomization. Establishes racing performance floor."
budget_seconds: 600

racing:
  level: level0
  total_timesteps: 500000
  num_envs: 64
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  rpy_coef: 0.06
  cuda: false
  seed: 42
