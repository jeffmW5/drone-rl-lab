name: exp_026_racecore_vzpenalty
backend: racing
hypothesis: "Add vertical velocity penalty to force earlier braking. exp_025b model modulates thrust near z=1.1 but momentum overshoots to z=2.3+. New vz_penalty = vz_coef * max(vz, 0) when z > vz_threshold penalizes upward velocity above 0.5m. Also tighter ceiling (z_high 1.5->1.3, just above highest gate z=1.2), stronger OOB (oob_coef 5->8), and higher gamma (0.94->0.97) for longer reward horizon."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # RaceCoreEnv-specific reward coefficients
  gate_bonus: 20.0
  proximity_coef: 2.0
  speed_coef: 0.1
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control
  alt_coef: 1.5
  survive_coef: 0.3
  # Vertical velocity penalty
  vz_coef: 0.5
  vz_threshold: 0.5
  # Hard OOB termination + penalty
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
