name: exp_026_racecore_vzpenalty
backend: racing
hypothesis: "exp_025b learned altitude awareness (thrust modulation at z~1.1) but momentum carries drone past z=1.5 to z=2.3+ (benchmark terminates at 2.5). Two fixes: (1) lower z_high to 1.3 (just above highest gate at z=1.2) forces the model to brake earlier in training; (2) add vertical velocity penalty -vz_coef * max(vz, 0) when z > 0.5 to directly penalize fast upward movement during ascent phase. Also increase gamma 0.94->0.97 so the model values longer survival. Goal: model learns to ascend smoothly to gate altitude and level off, not shoot past the ceiling."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # RaceCoreEnv-specific reward coefficients
  gate_bonus: 20.0
  proximity_coef: 2.0
  speed_coef: 0.1
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control (proven from exp_025b)
  alt_coef: 1.5
  survive_coef: 0.3
  # Hard OOB termination + penalty — tighter ceiling (1.3 vs 1.5)
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  # NEW: vertical velocity penalty to prevent momentum overshoot
  # Penalizes upward velocity when above z=0.5 (past initial takeoff phase)
  vz_coef: 0.5
  vz_threshold: 0.5
