name: exp_011_racing_gpu
backend: racing
hypothesis: "Full-scale GPU training — 1024 parallel envs, 1.5M steps, Level 0 (perfect knowledge). First GPU experiment to establish a proper racing baseline."
budget_seconds: 1800    # 30 min

racing:
  level: level0
  total_timesteps: 1500000
  num_envs: 1024
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  rpy_coef: 0.06
  cuda: true
  seed: 42
