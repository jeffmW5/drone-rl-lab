name: ai_gp_002_swift_teacher_gpu_ppo_10m
backend: ai_gp
hypothesis: >
  A 10-million-interaction Swift-style teacher benchmark will reveal whether
  deterministic race-start gate passage emerges before committing to the full
  100-million-interaction training budget.
budget_seconds: 7200

ai_gp:
  device: cuda
  allow_cpu: false
  seed: 42
  total_timesteps: 10092544
  curriculum_steps: 30000000
  num_envs: 4096
  num_steps: 32
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 32
  clip_coef: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  initial_logstd: -0.7
  target_kl: 0.02
  hidden_sizes: [128, 128]
  eval_interval_iterations: 25
  eval_episodes: 256
  eval_num_envs: 256
  eval_randomization: false

  env:
    actor_observation_mode: swift_teacher
    dt: 0.02
    physics_substeps: 2
    max_episode_steps: 750
    randomization: false
    align_spawn_heading_to_gate: true

    start_position_m: [-2.0, 0.0, 0.03]
    gate_positions_m:
      - [4.0, 0.0, 1.25]
      - [9.0, 1.5, 1.60]
      - [14.0, -1.0, 1.20]
      - [19.0, 0.5, 1.50]

    near_gate_spawn_ratio_start: 0.80
    near_gate_spawn_ratio_end: 0.15
    soft_collision_fraction: 0.20

    progress_reward: 12.0
    gate_reward: 20.0
    finish_reward: 40.0
    camera_alignment_reward: 0.20
    camera_alignment_exponent: 4.0
    forward_speed_reward: 0.0
    visibility_reward: 0.0
    alive_reward: 0.0
    angular_rate_penalty: 0.002
    action_delta_penalty: 0.01
    collision_penalty: 8.0
    out_of_bounds_penalty: 12.0
