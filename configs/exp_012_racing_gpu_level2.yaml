name: exp_012_racing_gpu_level2
backend: racing
hypothesis: "Competition difficulty (Level 2) — randomized inertial properties + randomized obstacles/gates. This is what the Kaggle leaderboard uses. Longer training to handle increased complexity."
budget_seconds: 3600    # 1 hour

racing:
  level: level2
  total_timesteps: 3000000
  num_envs: 1024
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  rpy_coef: 0.06
  cuda: true
  seed: 42
