name: ai_gp_041_windows_transfer_gate2_hardcase_30m
backend: ai_gp
hypothesis: >
  Windows AI-GP structured-state testing of 040 proved that runtime multiplier
  tuning alone is not enough: the best 12-config sweep reached active gate index
  2 but collided before clearing gate 2. This run starts from the promoted 040
  actor and uses anchored PPO on a gate-1/gate-2 near-plane curriculum derived
  from exports/ai_gp/ai_gp_windows_transfer_handoff_2026_06_28.json. The goal
  is to improve transfer through the Windows gate-1/gate-2 failure envelope
  without sacrificing 040's full-course surrogate reliability.
budget_seconds: 1500

windows_transfer_handoff:
  path: exports/ai_gp/ai_gp_windows_transfer_handoff_2026_06_28.json
  sha256: ec359ac473a851d5058ad9fea3b58f68db33e0bc63a17dc518635c61ba52592e
  source_run_id: structured_sweep_baseline_20260628_173724
  best_runtime_baseline:
    thrust_multiplier: 1.12
    roll_rate_multiplier: 2.00
    pitch_rate_multiplier: 1.00
    yaw_rate_multiplier: 2.00
  focused_failure_envelope:
    active_gates: [1, 2]
    signed_distance_m_observed: [-0.4720, 0.0677]
    lateral_offset_m_observed: [-0.9137, 1.3185]
    vertical_offset_m_observed: [-0.2005, 1.6132]
    speed_mps_observed: [3.8608, 5.7056]
    note: >
      The handoff contains summarized collision contexts, not full replay
      telemetry. The near-gate curriculum below expands this observed envelope
      so PPO sees recoverable states before the exact collision plane.

ai_gp:
  device: cuda
  allow_cpu: false
  seed: 241
  total_timesteps: 30146560
  curriculum_steps: 2500000
  num_envs: 4096
  num_steps: 64
  learning_rate: 0.0000018
  anneal_lr: true
  gamma: 0.997
  gae_lambda: 0.95
  update_epochs: 2
  num_minibatches: 32
  clip_coef: 0.025
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.28
  initial_logstd: -2.65
  target_kl: 0.0009
  actor_anchor_coef: 18.0
  actor_anchor_decay_steps: 0
  save_initial_actor_as_best: true
  hidden_sizes: [256, 256]
  eval_interval_iterations: 2
  eval_episodes: 512
  eval_num_envs: 512
  eval_randomization: true
  initial_actor_checkpoint: results/ai_gp_040_near_gate_teacher_bc_30m/best_policy.pt
  allow_teacher_initialization: true

  env:
    actor_observation_mode: structured_teacher_v2
    track_name: ai_gp_six_gate
    track_ground_clearance_m: 1.5
    start_position_ned_m: [0.0, 0.0, 0.0]
    position_observation_scale_m: [180.0, 20.0, 35.0]

    dt: 0.02
    physics_substeps: 2
    max_episode_steps: 1500
    randomization: true
    align_spawn_heading_to_gate: true
    start_position_noise_m: [0.25, 0.25, 0.08]
    start_velocity_noise_mps: 0.20
    spawn_yaw_noise_rad: 0.22
    spawn_tilt_noise_rad: 0.05
    gate_jitter_m: [0.16, 0.16, 0.14]

    near_gate_spawn_ratio_start: 0.90
    near_gate_spawn_ratio_end: 0.70
    near_gate_indices: [1, 2]
    near_gate_index_weights: [3.5, 1.0]
    near_gate_distance_m: [0.10, 5.5]
    near_gate_lateral_offset_m: [-1.45, 1.65]
    near_gate_vertical_offset_m: [-0.55, 2.05]
    near_gate_forward_speed_mps: [3.6, 6.3]
    near_gate_lateral_speed_mps: [-3.2, 3.2]
    near_gate_vertical_speed_mps: [-1.6, 1.6]
    near_gate_roll_rad: [-0.20, 0.20]
    near_gate_pitch_rad: [-0.60, 0.18]
    near_gate_yaw_offset_rad: [-0.36, 0.36]
    near_gate_previous_action_range:
      - [-0.65, 0.30]
      - [-1.00, 1.00]
      - [-0.75, 0.75]
      - [-0.50, 0.50]
    soft_collision_fraction: 0.0

    dynamics_model: measured_ai_gp_v1
