name: ai_gp_017_motion_safety_ppo_10m
backend: ai_gp
hypothesis: >
  Low-rate PPO fine-tuning of the best deployable optical-motion student can
  optimize closed-loop completion directly, while pre-boundary altitude costs
  and safety-aware checkpoint selection reduce its collision/bounds tradeoff.
budget_seconds: 7200

ai_gp:
  device: cuda
  allow_cpu: false
  seed: 57
  initial_actor_checkpoint: results/ai_gp_016_optical_motion_mlp_10m/best_student.pt
  total_timesteps: 10092544
  curriculum_steps: 1
  num_envs: 4096
  num_steps: 32
  learning_rate: 0.00003
  anneal_lr: true
  gamma: 0.99
  gae_lambda: 0.95
  update_epochs: 4
  num_minibatches: 32
  clip_coef: 0.10
  ent_coef: 0.001
  vf_coef: 0.5
  max_grad_norm: 0.5
  initial_logstd: -1.5
  target_kl: 0.01
  hidden_sizes: [256, 256]
  eval_interval_iterations: 10
  eval_episodes: 256
  eval_num_envs: 256
  eval_randomization: false

  env:
    actor_observation_mode: live_features_motion
    observation_history_length: 2
    dt: 0.02
    physics_substeps: 2
    max_episode_steps: 750
    randomization: true
    align_spawn_heading_to_gate: true
    start_position_m: [-2.0, 0.0, 0.03]
    gate_positions_m:
      - [4.0, 0.0, 1.25]
      - [9.0, 1.5, 1.60]
      - [14.0, -1.0, 1.20]
      - [19.0, 0.5, 1.50]
    near_gate_spawn_ratio_start: 0.0
    near_gate_spawn_ratio_end: 0.0
    soft_collision_fraction: 0.0
    progress_reward: 12.0
    gate_reward: 30.0
    finish_reward: 80.0
    camera_alignment_reward: 0.20
    camera_alignment_exponent: 4.0
    forward_speed_reward: 0.0
    visibility_reward: 0.0
    alive_reward: 0.0
    angular_rate_penalty: 0.004
    action_delta_penalty: 0.02
    vertical_speed_penalty: 0.20
    soft_altitude_limit_m: 2.5
    altitude_penalty: 4.0
    collision_penalty: 30.0
    out_of_bounds_penalty: 30.0
