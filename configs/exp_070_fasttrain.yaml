name: exp_070_fasttrain
backend: racing
hypothesis: "Fast pretraining variant of exp_070. Increase env step frequency to 100Hz
  via a training-only race config, remove the most expensive curriculum/reset baggage,
  shorten episodes, and keep the same direct-racing objective. Goal: materially higher
  throughput for Stage A pretraining before fine-tuning in full exp_070."
budget_seconds: 14400
racing:
  env_type: race
  level: level2
  race_config: level2_fasttrain_attitude.toml
  total_timesteps: 40000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  hidden_size: 128
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  body_frame_obs: true
  soft_collision: false
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  max_episode_steps: 800
  random_gate_start: false
  random_gate_ratio: 0.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
