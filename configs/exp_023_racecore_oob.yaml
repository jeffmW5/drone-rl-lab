name: exp_023_racecore_oob
backend: racing
hypothesis: "Extended RaceCoreEnv training with OOB altitude penalty. exp_022 benchmark showed model flies through ceiling (z=3.06) because no altitude bounds in reward. Adding oob_coef=2.0 penalty for z outside [0, 1.8]. Also 2x longer budget (3600s) for 5M+ steps."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 6000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # RaceCoreEnv-specific reward coefficients
  gate_bonus: 5.0
  proximity_coef: 2.0
  speed_coef: 0.1
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # OOB altitude penalty (NEW for exp_023)
  oob_coef: 2.0
  z_low: 0.0
  z_high: 1.8
