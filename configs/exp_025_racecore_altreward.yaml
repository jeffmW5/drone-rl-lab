name: exp_025_racecore_altreward
backend: racing
hypothesis: "Add altitude-matching reward to teach drone what height to fly at. exp_023b showed model applies max thrust regardless — it never learns altitude control because proximity reward doesn't discriminate between being near gate vs flying through gate height. New alt_reward = alt_coef * exp(-3 * |z - gate_z|) peaks when drone is at target gate's altitude. Also survive_coef=0.3 rewards staying alive (longer episodes). Keep proximity_coef=2.0 (exp_024 showed 1.0 is too weak). Grace period bug fixed."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # RaceCoreEnv-specific reward coefficients
  gate_bonus: 20.0
  proximity_coef: 2.0
  speed_coef: 0.1
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control
  alt_coef: 1.5
  survive_coef: 0.3
  # Hard OOB termination + penalty
  oob_coef: 5.0
  z_low: -0.05
  z_high: 1.5
