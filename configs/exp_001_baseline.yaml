name: exp_001_baseline
hypothesis: "Baseline: the original quartic reward from HoverAviary. max(0, 2 - distance^4). No changes — establishes our reference point."
budget_seconds: 180

reward_code: |
  dist = np.linalg.norm(self.TARGET_POS_CUSTOM - state[0:3])
  return max(0, 2 - dist**4)

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
