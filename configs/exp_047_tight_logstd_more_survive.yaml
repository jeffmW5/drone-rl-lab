name: exp_047_tight_logstd_more_survive
backend: racing
hypothesis: "exp_046 showed tight logstd (std<=0.37) produces consistent 1.3s flight toward gate
  but crashes 0.5s short. Increase survive_coef from 0.05 to 0.15 to buy extra flight time.
  Old hover trap (exp_026-034) happened WITH blown logstd — tight clamp should prevent mean from
  settling into hover since std=0.37 means gradients update the mean directly. If mean can't hide
  behind high variance, survive=0.15 should extend flight without creating hover trap."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === TIGHT LOGSTD CLAMP ===
  max_logstd: -1.0
  # === MORE STABILITY ===
  survive_coef: 0.15
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === MAXIMUM PROGRESS ===
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
