name: exp_016_gpu_level2_long
backend: racing
hypothesis: "Extended Level 2 training — 10M steps. If exp_015 reward is still climbing at 3M, more compute may push past the plateau."
budget_seconds: 7200    # 2 hours

racing:
  level: level2
  total_timesteps: 10000000
  num_envs: 1024
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  rpy_coef: 0.06
  cuda: true
  seed: 42
