name: exp_058_soft_collision
backend: racing
hypothesis: "Hover-or-crash binary trap (Hard Rule #28, #34): policy either hovers safely
  (no gates) or crashes instantly. Root cause: hard termination on crash means policy
  can never learn to navigate THROUGH crashes. Fix: 2-phase curriculum.
  Phase 1 (0-10M steps): crashes don't terminate, just apply -5.0 penalty + respawn
  near random gate. Policy can collect gate bonuses across multiple 'lives' per episode.
  Phase 2 (10M+ steps): hard termination restored once navigation is learned.
  Based on 'Mastering Diverse Cluttered Tracks' (RA-L 2025, arXiv 2512.09571).
  Uses bilateral_progress from exp_056."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === TIGHT LOGSTD CLAMP ===
  max_logstd: -1.0
  # === MINIMUM STABILITY (same as exp_046) ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === BILATERAL PROGRESS (from exp_056) ===
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === SOFT-COLLISION CURRICULUM (NEW) ===
  soft_collision: true
  soft_collision_penalty: 5.0
  soft_collision_steps: 10000000
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS (same as exp_046) ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
