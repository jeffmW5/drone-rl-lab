name: exp_045_logstd_clamp
backend: racing
hypothesis: "Same as exp_044 (min stability + max progress) but with max_logstd=0.5 to prevent
  std blowup. exp_044 achieved best-ever training reward (peak 37) but pitch std exploded to 90,
  making the mean meaningless. Clamping logstd to 0.5 (std ≤ 1.65) forces the policy to learn a
  meaningful mean action instead of relying on random exploration. Same reward coefficients as
  exp_044. 20M steps."
budget_seconds: 14400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === LOGSTD CLAMP ===
  max_logstd: 0.5
  # === MINIMUM STABILITY (same as exp_044) ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === MAXIMUM PROGRESS (same as exp_044) ===
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
