name: exp_027_racecore_randomgate
backend: racing
hypothesis: "Swift (Kaufmann et al., Nature 2023) resets agents at random gates with bounded perturbation, not always at the start. This forces the policy to learn ALL track segments equally. Currently our agent only practices gate 0-1 well. Random gate starts should dramatically improve mid/late-track navigation and finish rate. Inherits exp_026 reward shaping (vz penalty, tighter ceiling, higher gamma)."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # RaceCoreEnv-specific reward coefficients (inherited from exp_026)
  gate_bonus: 20.0
  proximity_coef: 2.0
  speed_coef: 0.1
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control (from exp_026)
  alt_coef: 1.5
  survive_coef: 0.3
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  # Random gate start (NEW - Swift-style)
  random_gate_start: true
  spawn_offset: 0.75       # meters before gate center along gate forward vector
  spawn_pos_noise: 0.15    # ±meters position perturbation at spawn
  spawn_vel_noise: 0.3     # ±m/s velocity perturbation at spawn
