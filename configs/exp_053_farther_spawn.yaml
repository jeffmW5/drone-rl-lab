name: exp_053_farther_spawn
backend: racing
hypothesis: "exp_046-052 all crash at ~1.3s benchmark because training spawns at 0.75m from gate
  but benchmark starts 2.06m from gate 0 at ground level. Increasing spawn_offset from 0.75 to
  1.5 doubles the training distance, bringing it closer to the benchmark geometry.
  spawn_pos_noise=0.3 (2x) and spawn_vel_noise=0.5 add variety. All else from exp_046."
budget_seconds: 3600
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 20000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === TIGHT LOGSTD CLAMP ===
  max_logstd: -1.0
  # === SAME SURVIVE AS EXP_046 ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === MAXIMUM PROGRESS ===
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === FARTHER SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 1.5
  spawn_pos_noise: 0.3
  spawn_vel_noise: 0.5
