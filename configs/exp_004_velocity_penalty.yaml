name: exp_004_velocity_penalty
hypothesis: "Adding velocity penalty to quartic reward incentivizes settling. Does the drone hover more stably and push past 474?"
budget_seconds: 180

reward_code: |
  dist = np.linalg.norm(self.TARGET_POS_CUSTOM - state[0:3])
  vel = np.linalg.norm(state[10:13])
  return max(0, 2 - dist**4) - 0.1 * vel

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
