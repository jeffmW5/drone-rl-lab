name: ai_gp_030_swift_full_course_bc_50m
backend: ai_gp_swift_bc
hypothesis: >
  A Swift-style full-course geometric teacher can provide dense action labels
  for the real six-gate AI-GP track. Behavior cloning over race-start and
  randomized active-gate states should produce a structured-state neural teacher
  that completes the full course before PPO fine-tuning.
budget_seconds: 7200

swift_bc:
  total_interactions: 50331648
  learning_rate: 0.0003
  eval_interval_updates: 500
  action_loss_weights: [1.0, 1.0, 1.0, 0.5]
  student_rollout_start_interactions: 10000000
  student_rollout_end_interactions: 30000000
  max_student_rollout_ratio: 0.50

ai_gp:
  device: cuda
  allow_cpu: false
  seed: 131
  num_envs: 4096
  hidden_sizes: [256, 256]
  eval_episodes: 512
  eval_num_envs: 512
  eval_randomization: false

  env:
    actor_observation_mode: structured_teacher_v2
    track_name: ai_gp_six_gate
    track_ground_clearance_m: 1.5
    start_position_ned_m: [0.0, 0.0, 0.0]
    position_observation_scale_m: [180.0, 20.0, 35.0]

    dt: 0.02
    physics_substeps: 2
    max_episode_steps: 1500
    randomization: true
    align_spawn_heading_to_gate: true
    start_position_noise_m: [0.20, 0.20, 0.06]
    start_velocity_noise_mps: 0.15
    spawn_yaw_noise_rad: 0.18
    spawn_tilt_noise_rad: 0.04
    gate_jitter_m: [0.12, 0.12, 0.10]

    near_gate_spawn_ratio_start: 0.40
    near_gate_spawn_ratio_end: 0.40
    near_gate_distance_m: [1.5, 18.0]
    near_gate_lateral_offset_m: [-1.0, 1.0]
    near_gate_vertical_offset_m: [-1.0, 4.0]
    near_gate_forward_speed_mps: [0.0, 14.0]
    near_gate_lateral_speed_mps: [-2.5, 2.5]
    near_gate_vertical_speed_mps: [-4.0, 1.5]
    near_gate_roll_rad: [-0.18, 0.18]
    near_gate_pitch_rad: [-0.80, 0.30]
    near_gate_yaw_offset_rad: [-0.45, 0.45]
    near_gate_previous_action_range:
      - [-0.50, 0.50]
      - [-0.80, 0.80]
      - [-0.90, 0.90]
      - [-0.50, 0.50]
    soft_collision_fraction: 0.0

    dynamics_model: measured_ai_gp_v1
    max_roll_rate_radps: 0.30
    max_pitch_rate_radps: 0.20
    max_yaw_rate_radps: 0.15
    thrust_command_center: 0.295
    thrust_command_span_up: 0.105
    thrust_command_span_down: 0.095
    thrust_acceleration_bias_mps2: -5.6171800889
    thrust_acceleration_gain_mps2: 57.2914093237
    base_pitch_offset_rad: 0.3106907308
    linear_drag_xyz: [0.1417047358, 0.1417047358, 0.3905510548]
    quadratic_drag_xyz: [0.0222959629, 0.0222959629, 0.0117516223]
    rate_response_gain: [2.6503460081, 2.5121130023, 2.5812295052]
    command_latency_s: 0.046
    command_latency_s_range: [0.035, 0.060]
    rate_time_constant_s: 0.005
    rate_time_constant_s_range: [0.005, 0.012]
    action_response: 1.0
    action_response_range: [0.92, 1.0]
    mass_scale_range: [0.97, 1.03]
    thrust_scale_range: [0.95, 1.05]
    drag_scale_range: [0.90, 1.10]
    rate_response_gain_scale_range: [0.93, 1.07]
    wind_accel_mps2: 0.10

    max_altitude_m: 35.0
    max_lateral_m: 20.0
    min_forward_m: -8.0
    max_forward_m: 180.0

    progress_reward: 10.0
    gate_reward: 120.0
    finish_reward: 220.0
    camera_alignment_reward: 0.15
    camera_alignment_exponent: 4.0
    forward_speed_reward: 0.0
    visibility_reward: 0.0
    alive_reward: 0.0
    angular_rate_penalty: 0.002
    action_delta_penalty: 0.020
    thrust_saturation_penalty: 0.10
    vertical_speed_penalty: 0.20
    altitude_penalty: 2.0
    gate_altitude_error_penalty: 0.40
    gate_lateral_error_penalty: 0.60
    collision_penalty: 20.0
    out_of_bounds_penalty: 30.0
    missed_gate_penalty: 330.0
    terminate_on_missed_gate: true
