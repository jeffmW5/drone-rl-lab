name: exp_029_racecore_balanced_speed
backend: racing
hypothesis: "exp_028 proved navigation is learnable (first gate pass!) but speed_coef=1.0 destroyed hover (0.94s vs 28.8s). This experiment finds the sweet spot: speed_coef=0.4 (enough lateral incentive, won't overwhelm hover), proximity_coef=1.0 (stronger directional signal than exp_028's 0.5), survive_coef=0.5 (up from 0.3 to reinforce staying alive), LR=0.0003 (more conservative to preserve hover skill from exp_026). Goal: maintain >10s flight time while passing at least 1 gate."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_026_racecore_vzpenalty/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # Reward: balanced speed + moderate proximity (NEW)
  gate_bonus: 20.0
  proximity_coef: 1.0
  speed_coef: 0.4
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control (from exp_026)
  alt_coef: 1.5
  survive_coef: 0.5
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  # No random gate starts
  random_gate_start: false
