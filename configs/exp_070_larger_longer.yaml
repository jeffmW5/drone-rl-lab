name: exp_070_larger_longer
backend: racing
hypothesis: "exp_069 (2x128) produced first deterministic gates (2/15) and peaked at
  52.39 reward at iter 650/848 (still climbing rapidly). Doubling the budget to
  14400s should allow the larger network to converge further. If gates improve
  proportionally, capacity + training time is the key. If gates plateau despite
  higher reward, something else is limiting.
  Single change from exp_069: budget_seconds 7200 -> 14400."
budget_seconds: 14400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  total_timesteps: 40000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_obs: 2
  cuda: true
  seed: 42
  # === LARGER NETWORK (validated in exp_069) ===
  hidden_size: 128
  # === NO LOGSTD CLAMP (validated in exp_067) ===
  # max_logstd: removed
  # === MINIMUM STABILITY ===
  survive_coef: 0.05
  alt_coef: 0.5
  z_low: -0.05
  z_high: 2.0
  # === BILATERAL PROGRESS ===
  bilateral_progress: true
  progress_coef: 50.0
  gate_bonus: 10.0
  speed_coef: 0.5
  gate_in_view_coef: 0.0
  reward_mode: add
  # === BODY-FRAME GATE OBSERVATIONS ===
  body_frame_obs: true
  # === SOFT-COLLISION CURRICULUM ===
  soft_collision: true
  soft_collision_penalty: 5.0
  soft_collision_steps: 10000000
  # === PENALTIES OFF ===
  proximity_coef: 0.0
  rpy_coef: 0.0
  act_coef: 0.0
  d_act_th_coef: 0.0
  d_act_xy_coef: 0.0
  vz_coef: 0.0
  vz_threshold: 0.5
  oob_coef: 0.0
  # === SPAWNS ===
  max_episode_steps: 1500
  random_gate_start: true
  random_gate_ratio: 1.0
  spawn_offset: 0.75
  spawn_pos_noise: 0.15
  spawn_vel_noise: 0.3
