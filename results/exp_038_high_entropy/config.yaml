name: exp_038_high_entropy
backend: racing
hypothesis: "Higher entropy (ent_coef=0.05, 7x increase) to fix policy mode collapse. The survive
  bracket (exp_034-037) proved reward tuning alone cannot solve hover-or-crash: stochastic policy
  navigates (28.61 reward) but deterministic mean crashes. ent_coef=0.05 prevents mode collapse by
  forcing wider policy distribution. At survive=0.5 (stable hover), entropy pushes exploration away
  from hover. PBRS + speed provide directional reward during exploration. The mean policy stays closer
  to the successful exploration distribution instead of collapsing to hover. This is a STRATEGY PIVOT
  from reward tuning to policy optimization."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_034_pbrs_speed/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0001
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.05
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  gate_bonus: 20.0
  proximity_coef: 1.0
  progress_coef: 50.0
  speed_coef: 0.7
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  alt_coef: 1.5
  survive_coef: 0.5
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  random_gate_start: false
