name: exp_019_gpu_gate_traj
backend: racing
hypothesis: "Gate-aware trajectories on GPU — if exp_018 shows the agent passes through gates on CPU, scale up to 1024 envs + 3M steps for competitive lap times."
budget_seconds: 1800
racing:
  level: level2
  total_timesteps: 3000000
  num_envs: 1024
  num_steps: 8
  learning_rate: 0.0015
  anneal_lr: true
  gamma: 0.94
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  rpy_coef: 0.06
  cuda: true
  gate_aware: true
  seed: 42
