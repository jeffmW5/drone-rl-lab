name: exp_028_racecore_highspeed
backend: racing
hypothesis: "Fine-tune exp_026 hover model with much higher speed reward to teach horizontal navigation. exp_026 hovers stably at z=0.72 but never moves toward gates because speed_coef=0.1 gives only 0.1 reward/step vs 1.8 for hovering. Increase speed_coef to 1.0 so moving at 1m/s toward gate matches hover reward. Also reduce proximity_coef from 2.0 to 0.5 for gentler falloff (signal from 2m away: 0.37 vs 0.018). No random gate starts — preserve hover and just add lateral navigation incentive."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_026_racecore_vzpenalty/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0005
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  # Reward: high speed + gentle proximity (NEW)
  gate_bonus: 20.0
  proximity_coef: 0.5
  speed_coef: 1.0
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  # Altitude control (from exp_026)
  alt_coef: 1.5
  survive_coef: 0.3
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  # No random gate starts
  random_gate_start: false
