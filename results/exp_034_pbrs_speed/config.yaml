name: exp_034_pbrs_speed
backend: racing
hypothesis: "PBRS + speed_coef=0.7 to break hover trap. The speed sweep (exp_028-031) showed a sharp
  phase transition at 0.7 with proximity reward, but PBRS eliminates the hover trap (no reward for
  hovering in place). With PBRS providing directional incentive (approach gate) and higher speed
  providing urgency (move now), the model should achieve stable navigation instead of the binary
  crash-or-hover seen in exp_026-033. Fine-tune from exp_033 which has PBRS + truncation fix +
  restored hover skill. Key test: does PBRS eliminate the speed phase transition?"
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_033_trunc_fix/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0001
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  gate_bonus: 20.0
  proximity_coef: 1.0
  progress_coef: 50.0
  speed_coef: 0.7
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  alt_coef: 1.5
  survive_coef: 0.5
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  random_gate_start: false
