name: exp_036_survive_015
backend: racing
hypothesis: "Binary search survive_coef at 0.15 — midpoint of bracketed range. exp_034 (0.5) hovers
  at 29.98s with 0 gates. exp_035 (0.0) crashes at 0.96s with 0 gates. If survive_coef has a sweet
  spot, 0.15 should produce intermediate behavior: enough stability to fly (>5s) but not so much
  that hovering dominates (avoid 29.98s hover trap). With PBRS progress_coef=50 and speed_coef=0.7,
  the model should have enough navigation incentive once the hover anchor is weakened. Fine-tune
  from exp_034 which has the best hover + PBRS + truncation fix foundation."
budget_seconds: 5400
racing:
  env_type: race
  level: level2
  race_config: level2_attitude.toml
  pretrained_ckpt: /workspace/drone-rl-lab/results/exp_034_pbrs_speed/model.ckpt
  total_timesteps: 8000000
  num_envs: 512
  num_steps: 8
  learning_rate: 0.0001
  anneal_lr: true
  gamma: 0.97
  gae_lambda: 0.97
  update_epochs: 10
  num_minibatches: 8
  clip_coef: 0.26
  ent_coef: 0.007
  vf_coef: 0.7
  max_grad_norm: 1.5
  n_obs: 2
  cuda: true
  seed: 42
  gate_bonus: 20.0
  proximity_coef: 1.0
  progress_coef: 50.0
  speed_coef: 0.7
  rpy_coef: 0.06
  act_coef: 0.02
  d_act_th_coef: 0.4
  d_act_xy_coef: 1.0
  max_episode_steps: 1500
  alt_coef: 1.5
  survive_coef: 0.15
  vz_coef: 0.5
  vz_threshold: 0.5
  oob_coef: 8.0
  z_low: -0.05
  z_high: 1.3
  random_gate_start: false
